schema_version: agentflow.tool.v0
namespace: marker
name: marker_survival_scan
version: 0.1.0
maturity: wrapped
description: Scan a candidate marker against expression and survival tables.
validator_profile: paired_expression_survival_v0
inputs:
  expression_table:
    required: true
    required_columns: sample,TP53
  survival_table:
    required: true
params:
  gene:
    type: string
    required: true
outputs:
  report:
    type: Markdown
    observer: marker_report
    min_rows: 3
runtime:
  backend: local
  command:
    - /bin/sh
    - marker_survival_scan.sh
