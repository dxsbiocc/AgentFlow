schema_version: agentflow.tool.v0
namespace: local
name: survival_assoc
version: 0.1.0
# verified: deterministic, offline, standard method (median split + log-rank),
# validated to reproduce the cBioPortal reference (tcga/survival_assoc) exactly
# (SPP1/LIHC score 4.306, log-rank p=4.94e-5), and covered by integration tests.
maturity: verified
description: Local survival association for a gene over imported expression and survival tables (median split, log-rank). Offline, no network.
validator_profile: paired_expression_survival_v0
inputs:
  expression_table:
    type: ExpressionTable
    required: true
    required_columns: sample
  survival_table:
    type: SurvivalTable
    required: true
params:
  gene:
    type: string
    required: true
outputs:
  report:
    type: Markdown
    observer: marker_report
    min_rows: 3
runtime:
  backend: local
  command:
    - /usr/bin/env
    - python3
    - local_survival_assoc.py
